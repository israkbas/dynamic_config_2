services:
  mongo:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
      - ./mongo-init:/docker-entrypoint-initdb.d

  admin-api:
    build:
      context: .
      dockerfile: src/AdminApi/Dockerfile
    ports:
      - "5090:8080"
    environment:
      - MongoConnectionString=${MONGO_CONNECTION_STRING}
      - ASPNETCORE_URLS=http://+:8080
    depends_on:
      - mongo

  service-a-demo:
    build:
      context: .
      dockerfile: src/ServiceA.Demo/Dockerfile
    environment:
      - MONGO_CONNECTION_STRING=${MONGO_CONNECTION_STRING}
    depends_on:
      - mongo

  service-b-demo:
    build:
      context: .
      dockerfile: src/ServiceB.Demo/Dockerfile
    environment:
      - MONGO_CONNECTION_STRING=${MONGO_CONNECTION_STRING}
    depends_on:
      - mongo

volumes:
  mongo-data:
